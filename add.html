<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增/编辑信息</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin();initEdit();">
    <div class="top-header">
        <h1>个人信息综合管理平台</h1>
        <p>政务标准化管理系统 | 信息录入</p>
    </div>

    <div class="container">
        <div class="nav-bar">
            <a href="index.html">信息列表</a>
            <a href="add.html" class="active">新增信息</a>
            <a href="javascript:logout();">退出登录</a>
        </div>

        <div class="gov-card">
            <div class="card-title">信息录入表单 <span class="red">* 所有字段均为必填项</span></div>
            <div class="card-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>姓　　名 <span class="red">*</span>：</label>
                    <input type="text" id="name" placeholder="请输入真实姓名">
                </div>
                <div class="form-group">
                    <label>性　　别 <span class="red">*</span>：</label>
                    <select id="gender">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>年　　龄 <span class="red">*</span>：</label>
                    <input type="number" id="age" placeholder="请输入年龄" min="1" max="150">
                </div>
                <div class="form-group">
                    <label>手机号 <span class="red">*</span>：</label>
                    <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>身份证号 <span class="red">*</span>：</label>
                    <input type="text" id="idCard" placeholder="请输入15/18位身份证号" maxlength="18">
                </div>
                <div class="form-group">
                    <label>家庭住址 <span class="red">*</span>：</label>
                    <textarea id="address" rows="4" placeholder="请输入详细家庭住址"></textarea>
                </div>
                <div class="form-group" style="margin-left: 120px;">
                    <button class="btn btn-primary" onclick="saveInfo()">提 交 保 存</button>
                    <button class="btn btn-default" style="margin-left:15px;" onclick="location.href='index.html'">返 回 列 表</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js">
        // 初始化编辑数据
        function initEdit(){
            let idx = localStorage.getItem("editIndex");
            if(idx !== null){
                let list = getData();
                let item = list[Number(idx)];
                document.getElementById("editId").value = idx;
                document.getElementById("name").value = item.name;
                document.getElementById("gender").value = item.gender;
                document.getElementById("age").value = item.age;
                document.getElementById("phone").value = item.phone;
                document.getElementById("idCard").value = item.idCard;
                document.getElementById("address").value = item.address;
                localStorage.removeItem("editIndex");
            }
        }
    </script>
</body>
</html>
