<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 个人信息管理平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrap">
        <div class="top-header" style="width:100%;max-width:480px;border-radius: var(--radius) var(--radius) 0 0;">
            <h1>个人信息综合管理平台</h1>
            <p>政务标准化管理系统 · 新用户注册</p>
        </div>

        <div class="login-box gov-card">
            <div class="card-title">新用户注册</div>
            <div class="card-body">
                <div class="form-group">
                    <label>用户名：</label>
                    <input type="text" id="regUser" placeholder="设置登录用户名">
                </div>
                <div class="form-group">
                    <label>登录密码：</label>
                    <input type="password" id="regPwd" placeholder="设置登录密码">
                </div>
                <div class="form-group">
                    <label>确认密码：</label>
                    <input type="password" id="regPwd2" placeholder="再次输入密码">
                </div>
                <div style="margin-left: 120px;">
                    <button class="btn btn-primary" onclick="registerUser()">注 册</button>
                </div>
            </div>
        </div>

        <div class="login-tip">
            已有账号？<a href="login.html">返回登录</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
