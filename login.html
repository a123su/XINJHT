<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - 个人信息管理平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrap">
        <div class="top-header" style="width:100%;max-width:480px;border-radius: var(--radius) var(--radius) 0 0;">
            <h1>个人信息综合管理平台</h1>
            <p>政务标准化管理系统 · 安全登录</p>
        </div>

        <div class="login-box gov-card">
            <div class="card-title">用户登录</div>
            <div class="card-body">
                <div class="form-group">
                    <label>用户名：</label>
                    <input type="text" id="loginUser" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密　　码：</label>
                    <input type="password" id="loginPwd" placeholder="请输入密码">
                </div>
                <div style="margin-left: 120px;">
                    <button class="btn btn-primary" onclick="login()">登 录</button>
                </div>
            </div>
        </div>

        <div class="login-tip">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
